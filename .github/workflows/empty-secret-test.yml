name: Empty Secret Test
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== Testing empty secret ==="
          if [ -n "${{ secrets.EMPTY_SECRET }}" ]; then
            echo "RESULT: EMPTY_SECRET_ACCESSED=true"
          else
            echo "RESULT: EMPTY_SECRET_ACCESSED=false"
          fi
          
          echo "=== Testing non-existent secret ==="
          if [ -n "${{ secrets.NON_EXISTENT }}" ]; then
            echo "RESULT: NON_EXISTENT_ACCESSED=true"
          else
            echo "RESULT: NON_EXISTENT_ACCESSED=false"
          fi
