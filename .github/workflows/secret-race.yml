name: Secret Race Test
on: 
  workflow_dispatch:
  push:

jobs:
  race-test:
    runs-on: ubuntu-latest
    steps:
      - name: Read secret
        run: |
          echo "=== TEST START ==="
          echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ -n "${{ secrets.TEST_SECRET }}" ]; then
            echo "RESULT: SECRET_ACCESSED=true"
            echo "SECRET_LENGTH: ${#TEST_SECRET}"
          else
            echo "RESULT: SECRET_ACCESSED=false"
          fi
          echo "=== TEST END ==="
